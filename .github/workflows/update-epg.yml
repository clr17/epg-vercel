name: Update EPG

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:

jobs:
  download-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download EPG from iptv-epg.org
        run: |
          curl -sL "https://iptv-epg.org/files/epg-us.xml.gz" -o public/guide.xml.gz
          ls -lh public/guide.xml.gz

      - name: Deploy to Vercel
        run: |
          cp vercel.json public/
          cd public
          npx vercel@latest deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.PROJECT_ID }}
