name: Update EPG

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:

jobs:
  download-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download and filter EPG
        run: |
          curl -sL "https://iptv-epg.org/files/epg-us.xml.gz" -o epg-us.xml.gz
          node filter-epg.js epg-us.xml.gz public/guide.xml
          ls -lh public/guide.xml

      - name: Deploy to Vercel
        run: |
          npx vercel@latest deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.PROJECT_ID }}
