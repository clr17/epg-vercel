name: Update EPG

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:

jobs:
  download-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone iptv-org/epg and grab EPG data
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git /tmp/epg
          cd /tmp/epg
          npm install
          npx epg-grabber --config=sites/config.js --channels=${{ github.workspace }}/channels.xml --output=${{ github.workspace }}/public/guide.xml
          ls -lh ${{ github.workspace }}/public/guide.xml

      - name: Deploy to Vercel
        run: |
          cp vercel.json public/
          cd public
          npx vercel@latest deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.PROJECT_ID }}
