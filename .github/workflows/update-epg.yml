name: Update EPG

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:

jobs:
  grab-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clone iptv-org/epg
        run: |
          git clone --depth 1 -b master https://github.com/iptv-org/epg.git epg-src
          cd epg-src && npm ci

      - name: Merge channel lists
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > channels.xml
          echo '<channels>' >> channels.xml
          
          cat epg-src/sites/epgshare01.online/epgshare01.online_US1.channels.xml \
            | grep '<channel ' >> channels.xml
          cat epg-src/sites/epgshare01.online/epgshare01.online_US_SPORTS1.channels.xml \
            | grep '<channel ' >> channels.xml
          
          echo '</channels>' >> channels.xml
          echo "Total channels: $(grep -c '<channel ' channels.xml)"

      - name: Grab guide
        run: |
          cd epg-src
          NODE_OPTIONS=--max-old-space-size=6000 npm run grab -- \
            --channels=../channels.xml \
            --output=../public/guide.xml \
            --maxConnections=10 \
            --timeout=60000

      - name: Deploy to Vercel
        run: npx vercel@latest deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.PROJECT_ID }}
